apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-deployment

spec:
  replicas: 5

  selector:
    matchLabels:
      app: demo-app

  template:
    metadata:
      labels:
        app: demo-app

    spec:
      containers:
      - name: demo-container
        image: k8s-demo
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "200m"